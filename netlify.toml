[build]
  command = "bash -lc 'mkdir -p \"$HOME/.local/bin\" && curl -L -o quarto.tar.gz \"https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.27/quarto-1.9.27-linux-amd64.tar.gz\" && tar -xzf quarto.tar.gz && mv quarto-*/bin/quarto \"$HOME/.local/bin/\" && chmod +x \"$HOME/.local/bin/quarto\" && export PATH=\"$HOME/.local/bin:$PATH\" && quarto render'"
  publish = "_site"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
