[build]
  command = "bash -lc 'apt-get update && apt-get install -y r-base && mkdir -p \"$HOME/.local/quarto\" && curl -L -o quarto.tar.gz \"https://github.com/quarto-dev/quarto-cli/releases/download/v1.9.27/quarto-1.9.27-linux-amd64.tar.gz\" && tar -xzf quarto.tar.gz -C \"$HOME/.local/quarto\" --strip-components=1 && chmod +x \"$HOME/.local/quarto/bin/quarto\" && export PATH=\"$HOME/.local/quarto/bin:$PATH\" && quarto render'"
  publish = "_site"
  functions = "netlify/functions"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
