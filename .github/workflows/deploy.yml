name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.1'

      - name: Install R dependencies
        run: |
          install.packages(c("knitr", "rmarkdown", "htmltools"))
        shell: Rscript {0}

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render content validity page
        run: quarto render content-validity.qmd

      - name: Prepare deploy directory
        run: |
          mkdir -p _deploy/data
          cp _site/content-validity.html _deploy/index.html
          cp -r site_libs _deploy/ 2>/dev/null || true
          cp data/item_quality_template.csv _deploy/data/

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=_deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
